<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 400px; padding: 16px; font-family: sans-serif; }
    h2 { margin-top: 0; font-size: 16px; }
    button {
      width: 100%;
      padding: 8px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 12px;
    }
    button:hover { background: #0056b3; }
    textarea {
      width: 100%;
      height: 200px;
      margin-bottom: 8px;
      font-family: monospace;
      font-size: 11px;
      border: 1px solid #ddd;
      border-radius: 4px;
      resize: vertical;
    }
    .status { font-size: 12px; color: #666; text-align: right; }
    #openDashboard { background: #6f42c1; }
    #openDashboard:hover { background: #5a32a3; }
    .secondary { background: #0d6efd; }
    .secondary:hover { background: #0b5ed7; }
    .tertiary { background: #198754; }
    .tertiary:hover { background: #157347; }
    .muted { background: #6c757d; }
    .muted:hover { background: #5c636a; }
  </style>
</head>
<body>
  <h2>Relay Dashboard</h2>
  <button id="openDashboard">🖥️ Open tv.n2nj.moe</button>

  <h2>Relay Package</h2>
  <button id="copyRelayPackage" class="secondary">Copy Full Relay Package</button>
  <button id="sendRelay" class="tertiary">Send To Relay Channel</button>
  <button id="capture" class="muted">Force Page Headers</button>
  <textarea id="output" placeholder="Result will appear here..."></textarea>
  <div class="status" id="status"></div>
  <script type="module" src="popup.js"></script>
</body>
</html>
